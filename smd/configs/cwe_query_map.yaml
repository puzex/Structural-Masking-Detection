# CWE to CodeQL query / Semgrep rule mapping for PVBench C/C++ vulnerabilities.
# CodeQL paths are relative to tools/codeql-repo/
# Semgrep rules use --config=auto or rule IDs from semgrep registry.
#
# checker_strategy: "codeql" | "semgrep" | "none"
# no-checker-available means pass-through (no static checker can reliably detect this CWE)

CWE-476:
  description: "NULL Pointer Dereference"
  pvbench_count: 52
  checker_strategy: semgrep
  codeql_query: null
  semgrep_rules:
    - c.lang.security.null-pointer-deref.null-pointer-deref
  notes: "CodeQL has no dedicated null-deref query for C/C++; use Critical/MissingNullTest.ql as supplementary"
  codeql_supplementary: "cpp/ql/src/Critical/MissingNullTest.ql"

CWE-617:
  description: "Reachable Assertion"
  pvbench_count: 40
  checker_strategy: none
  codeql_query: null
  semgrep_rules: []
  notes: "No reliable static checker for reachable assertions — pass-through"

CWE-122:
  description: "Heap Buffer Overflow"
  pvbench_count: 33
  checker_strategy: codeql
  codeql_query: "cpp/ql/src/Security/CWE/CWE-120/OverrunWrite.ql"
  semgrep_rules:
    - c.lang.security.insecure-use-strcpy-fn.insecure-use-strcpy-fn
  notes: "CWE-120 OverrunWrite covers heap buffer overflows in C/C++"

CWE-416:
  description: "Use After Free"
  pvbench_count: 32
  checker_strategy: codeql
  codeql_query: "cpp/ql/src/Critical/UseAfterFree.ql"
  semgrep_rules:
    - c.lang.security.use-after-free.use-after-free
  notes: "CodeQL Critical/UseAfterFree.ql is the primary checker"

CWE-190:
  description: "Integer Overflow"
  pvbench_count: 26
  checker_strategy: codeql
  codeql_query: "cpp/ql/src/Security/CWE/CWE-190/ArithmeticUncontrolled.ql"
  semgrep_rules:
    - c.lang.security.integer-overflow.integer-overflow
  notes: "ArithmeticUncontrolled covers integer overflow from external/uncontrolled sources"

CWE-121:
