# ---- PatchEval CWEs: Python / JavaScript / Go ----
# CodeQL query paths are relative to tools/codeql-repo/
# checker_strategy: "codeql" means use CodeQL DB + query (primary)
#                   "semgrep" means use Semgrep rules (no CodeQL query available for this CWE/language)
#                   "none" means pass-through (no reliable static checker)
# Per-language overrides are in codeql_queries / semgrep_rules maps keyed by language code.

CWE-94:
  description: "Code Injection"
  patcheval_count: 142
  checker_strategy: codeql
  codeql_queries:
    python: "python/ql/src/Security/CWE-094/CodeInjection.ql"
    javascript: "javascript/ql/src/Security/CWE-094/CodeInjection.ql"
    go: null
  semgrep_rules:
    python: "p/python"
    javascript: "p/javascript"
    go: "p/golang"
  notes: "Primary for Python/JS; Go falls back to Semgrep p/golang"
